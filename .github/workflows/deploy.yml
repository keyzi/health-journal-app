name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ vars.SSH_HOST || secrets.SSH_HOST }}
      SSH_USER: ${{ vars.SSH_USER || secrets.SSH_USER }}
      SSH_KEY: ${{ secrets.SSH_KEY }}
      SSH_PORT: ${{ vars.SSH_PORT || secrets.SSH_PORT || '22' }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || secrets.DEPLOY_PATH }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build

      - name: Validate deploy secrets
        run: |
          missing=0
          for name in SSH_HOST SSH_USER SSH_KEY DEPLOY_PATH; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required deploy setting: $name"
              missing=1
            fi
          done
          exit "$missing"

      - name: Deploy
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: -avz --delete
          path: dist/
          remote_path: ${{ env.DEPLOY_PATH }}
          remote_host: ${{ env.SSH_HOST }}
          remote_user: ${{ env.SSH_USER }}
          remote_key: ${{ env.SSH_KEY }}
          remote_port: ${{ env.SSH_PORT }}
